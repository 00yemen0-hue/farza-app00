name: Convert Zip Project to APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          sudo apt-get install unzip
          unzip -o "anonai (1).zip" -d .
          
          if [ -d "anonai (1)" ]; then
            cp -r "anonai (1)"/* .
          elif [ -d "anonai" ]; then
            cp -r anonai/* .
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Missing Debug Keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Inject Gemini API Key Safely
        run: |
          # التقاط المفتاح من خزنة جيت هاب
          VAL="${{ secrets.GEMINI_API_KEY }}"
          
          # حماية ذكية: إذا كانت الخزنة فارغة نضع نصاً بدليلاً محاطاً بعلامات تنصيص لضمان نجاح البناء
          if [ -z "$VAL" ]; then
            VAL="YOUR_GEMINI_API_KEY_HERE"
          fi
          
          # حقن المفتاح بصيغ نصوص صريحة داخل ملفات الإعدادات لمنع خطأ الـ Syntax
          echo "GEMINI_API_KEY=$VAL" > .env
          
          echo "GEMINI_API_KEY=\"$VAL\"" > local.properties
          echo "apiKey=\"$VAL\"" >> local.properties
          echo "apiKey=$VAL" >> local.properties
          
          echo "" >> gradle.properties
          echo "GEMINI_API_KEY=\"$VAL\"" >> gradle.properties

      - name: Build APK
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          elif [ -f "settings.gradle" ] || [ -f "settings.gradle.kts" ]; then
            gradle assembleDebug
          else
            echo "❌ خطأ: لم يتم العثور على ملفات مشروع أندرويد."
            exit 1
          fi

      - name: Upload Generated APK
        uses: actions/upload-artifact@v4
        with:
          name: My-Application-APK
          path: "**/build/outputs/apk/debug/*.apk" 
