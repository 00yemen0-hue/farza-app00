name: Convert Zip Project to APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Unzip Project Files
        run: |
          sudo apt-get install unzip
          # فك ضغط الملف في المجلد الرئيسي للمستودع
          unzip -o "anonai (1).zip" -d .
          
          # إذا كانت الملفات مستخرجة داخل مجلد داخلي بنفس الاسم، يتم نقلها للخارج
          if [ -d "anonai (1)" ]; then
            cp -r "anonai (1)"/* .
          elif [ -d "anonai" ]; then
            cp -r anonai/* .
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build APK
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          elif [ -f "settings.gradle" ] || [ -f "settings.gradle.kts" ]; then
            gradle assembleDebug
          else
            echo "❌ خطأ: لم يتم العثور على ملفات مشروع أندرويد جاهزة بعد فك الضغط."
            echo "إذا كان ملف الـ Zip يحتوي على موقع ويب (HTML/JS) وليس مشروع أندرويد/فلاتر، أخبرني لأقوم بتعديل الكود ليناسب تحويل المواقع."
            exit 1
          fi

      - name: Upload Generated APK
        uses: actions/upload-artifact@v4
        with:
          name: My-Application-APK
          path: "**/build/outputs/apk/debug/*.apk"

